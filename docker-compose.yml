services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vendor_dd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dd_user
      POSTGRES_PASSWORD: dd_pass
      POSTGRES_DB: vendor_dd
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dd_user -d vendor_dd" ]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: vendor_dd_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
